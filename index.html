<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Портфолио — Автоматизация бизнес-процессов с помощью ИИ</title>
    <meta
      name="description"
      content="Автоматизирую рутину бизнеса с помощью ИИ. 20+ лет в коммерции. Кейсы: AI-агенты, калькуляторы, дашборды, парсинг — с живыми демо."
    />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Ставим тему до отрисовки, чтобы не было вспышки (дефолт — светлая)
      (function () {
        var t = localStorage.getItem("theme");
        if (t === "dark") document.documentElement.setAttribute("data-theme", "dark");
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
